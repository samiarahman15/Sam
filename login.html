<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - HostelHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-[#F8F1E9] min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full bg-white p-10 rounded-3xl shadow-2xl border border-[#EDE4D5]">
    <!-- Logo / Header -->
    <div class="flex justify-center mb-8">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-[#4A7043] rounded-2xl flex items-center justify-center text-3xl">🏠</div>
        <h1 class="text-3xl font-bold text-[#4A7043]">HMS Portal</h1>
      </div>
    </div>

    <h2 class="text-4xl font-bold text-center mb-8 text-[#1F2937]">Login</h2>
   
    <div class="space-y-6">
      <div>
        <label class="block mb-2 text-[#374151] font-medium">Email / Student ID</label>
        <input type="text" 
               class="w-full px-5 py-4 bg-[#F8F1E9] border border-[#D1C7B5] rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#E65C3A] focus:border-transparent transition-all" 
               placeholder="Enter email or ID">
      </div>
      
      <div>
        <label class="block mb-2 text-[#374151] font-medium">Password</label>
        <input type="password" 
               class="w-full px-5 py-4 bg-[#F8F1E9] border border-[#D1C7B5] rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#E65C3A] focus:border-transparent transition-all" 
               placeholder="••••••••">
      </div>

      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center gap-2 text-[#374151]">
          <input type="checkbox" class="accent-[#E65C3A] w-4 h-4">
          Remember me
        </label>
        <a href="#" class="text-[#E65C3A] hover:underline font-medium">Forgot Password?</a>
      </div>

      <button onclick="window.location.href='dashboard.html'"
              class="w-full bg-[#E65C3A] hover:bg-[#d94e2f] py-4 rounded-2xl font-semibold text-lg text-white transition-all shadow-md">
        Login
      </button>

      <p class="text-center text-[#374151]">
        Don't have an account? 
        <a href="signup.html" class="text-[#E65C3A] hover:underline font-medium">Sign Up</a>
      </p>
    </div>
  </div>
</body>
</html>
