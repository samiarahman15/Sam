<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - HostelHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full bg-gray-900 p-10 rounded-3xl shadow-2xl">
    <h2 class="text-4xl font-bold text-center mb-8">Login</h2>
    
    <div class="space-y-6">
      <div>
        <label class="block mb-2">Email / Student ID</label>
        <input type="text" class="w-full px-5 py-4 bg-gray-800 rounded-2xl focus:outline-none focus:ring-2 focus:ring-cyan-500" placeholder="Enter email or ID">
      </div>
      <div>
        <label class="block mb-2">Password</label>
        <input type="password" class="w-full px-5 py-4 bg-gray-800 rounded-2xl focus:outline-none focus:ring-2 focus:ring-cyan-500" placeholder="••••••••">
      </div>

      <div class="flex items-center justify-between">
        <label><input type="checkbox" class="accent-cyan-500"> Remember me</label>
        <a href="#" class="text-cyan-400 hover:underline">Forgot Password?</a>
      </div>

      <button onclick="window.location.href='dashboard.html'" 
              class="w-full bg-cyan-500 hover:bg-cyan-600 py-4 rounded-2xl font-semibold text-lg">
        Login
      </button>

      <p class="text-center">Don't have an account? 
        <a href="signup.html" class="text-cyan-400 hover:underline">Sign Up</a>
      </p>
    </div>
  </div>
</body>
</html>
