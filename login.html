<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMS Portal - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fa-solid fa-hotel auth-logo"></i>
                <h2>Welcome Back</h2>
                <p>Login to access your HMS account</p>
            </div>

            <form action="index.html" class="auth-form">
                <div class="input-group">
                    <label for="login-id"><i class="fa-solid fa-id-card"></i> Student ID / Email</label>
                    <input type="text" id="login-id" placeholder="samia@university.edu" required>
                </div>

                <div class="input-group">
                    <label for="login-password"><i class="fa-solid fa-lock"></i> Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>

                <div class="auth-actions">
                    <label class="remember-me">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-pass">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-auth">Log In to Portal</button>
            </form>

            <div class="auth-footer">
                <p>New Resident? <a href="signup.html">Create an Account</a></p>
            </div>
        </div>
    </div>

</body>
</html>
