<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Management</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <h1>Room Management</h1>

    <div class="card">
        <h3>Add Room</h3>

        <input type="text" placeholder="Room Number">
        <input type="number" placeholder="Capacity">
        <input type="number" placeholder="Available Seats">

        <button class="btn">Save Room</button>
    </div>

    <div class="card">
        <h3>Room List</h3>

        <table>
            <tr>
                <th>Room</th>
                <th>Capacity</th>
                <th>Available</th>
            </tr>

            <tr>
                <td>A-101</td>
                <td>4</td>
                <td>1</td>
            </tr>

            <tr>
                <td>A-102</td>
                <td>4</td>
                <td>2</td>
            </tr>

            <tr>
                <td>B-201</td>
                <td>6</td>
                <td>3</td>
            </tr>
        </table>
    </div>
</div>

</body>
</html>
