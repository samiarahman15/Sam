<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Order - HostelHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-white">
  <div class="flex min-h-screen">
    <div class="flex-1 p-8">
      <h2 class="text-4xl font-bold mb-8">Food Menu</h2>
      
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="bg-gray-900 p-6 rounded-3xl text-center flex flex-col justify-between items-center">
          <div>
            <i class="fas fa-bowl-food text-5xl mb-4 text-orange-400"></i>
            <h3 class="text-xl">Biriyani</h3>
            <p class="text-2xl font-bold mt-2">৳ 120</p>
          </div>
          <button onclick="alert('Added to cart!')" class="mt-4 bg-green-600 hover:bg-green-700 w-full py-3 rounded-2xl transition duration-200">Add to Cart</button>
        </div>

        <div class="bg-gray-900 p-6 rounded-3xl text-center flex flex-col justify-between items-center">
          <div>
            <i class="fas fa-bowl-food text-5xl mb-4 text-orange-400"></i>
            <h3 class="text-xl">Rice, Dal and Curry</h3>
            <p class="text-2xl font-bold mt-2">৳ 160</p>
          </div>
          <button onclick="alert('Added to cart!')" class="mt-4 bg-green-600 hover:bg-green-700 w-full py-3 rounded-2xl transition duration-200">Add to Cart</button>
        </div>

        <div class="bg-gray-900 p-6 rounded-3xl text-center flex flex-col justify-between items-center">
          <div>
            <i class="fas fa-bowl-food text-5xl mb-4 text-orange-400"></i>
            <h3 class="text-xl">Khichuri</h3>
            <p class="text-2xl font-bold mt-2">৳ 70</p>
          </div>
          <button onclick="alert('Added to cart!')" class="mt-4 bg-green-600 hover:bg-green-700 w-full py-3 rounded-2xl transition duration-200">Add to Cart</button>
        </div>

        <div class="bg-gray-900 p-6 rounded-3xl text-center flex flex-col justify-between items-center">
          <div>
            <i class="fas fa-pizza-slice text-5xl mb-4 text-orange-400"></i>
            <h3 class="text-xl">Pizza</h3>
            <p class="text-2xl font-bold mt-2">৳ 200</p>
          </div>
          <button onclick="alert('Added to cart!')" class="mt-4 bg-green-600 hover:bg-green-700 w-full py-3 rounded-2xl transition duration-200">Add to Cart</button>
        </div>

        <div class="bg-gray-900 p-6 rounded-3xl text-center flex flex-col justify-between items-center">
          <div>
            <i class="fas fa-hamburger text-5xl mb-4 text-orange-400"></i>
            <h3 class="text-xl">Burger</h3>
            <p class="text-2xl font-bold mt-2">৳ 60</p>
          </div>
          <button onclick="alert('Added to cart!')" class="mt-4 bg-green-600 hover:bg-green-700 w-full py-3 rounded-2xl transition duration-200">Add to Cart</button>
        </div>

        </div> </div>
  </div>

</html>
