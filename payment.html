<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment - HostelHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <div class="max-w-2xl mx-auto mt-20 bg-gray-900 p-10 rounded-3xl">
    <h2 class="text-4xl font-bold text-center mb-10">Make Payment</h2>
    
    <div class="bg-gray-800 p-8 rounded-2xl mb-8">
      <p class="text-lg">Total Due: <span class="text-3xl font-bold text-orange-400">৳ 2450</span></p>
    </div>

    <div class="space-y-6">
      <button class="w-full bg-emerald-600 hover:bg-emerald-700 py-5 text-xl rounded-2xl">Pay with bKash</button>
      <button class="w-full bg-blue-600 hover:bg-blue-700 py-5 text-xl rounded-2xl">Pay with Nagad</button>
      <button class="w-full bg-cyan-500 hover:bg-cyan-600 py-5 text-xl rounded-2xl">Card Payment</button>
    </div>
  </div>
</body>
</html>
