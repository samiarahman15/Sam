<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Management - Dashboard</title>
    <!-- Tailwind CSS for modern UI -->
    <script src="https://jsdelivr.net"></script>
    <!-- FontAwesome for professional icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body class="bg-gray-100 font-sans flex h-screen overflow-hidden">

    <!-- 1. SIDEBAR (বামপাশের মেনু) -->
    <aside class="w-64 bg-slate-800 text-white flex flex-col justify-between shadow-lg">
        <div>
            <!-- Hostel Logo/Title -->
            <div class="p-6 text-xl font-bold tracking-wider border-b border-slate-700 flex items-center gap-3">
                <i class="fa-solid fa-hotel text-emerald-400"></i> HMS Portal
            </div>
            <!-- Navigation Links -->
            <nav class="mt-6 px-4 space-y-2">
                <a href="dashboard.html" class="flex items-center gap-4 py-3 px-4 rounded-lg bg-emerald-600 text-white font-medium transition-all">
                    <i class="fa-solid fa-users text-lg"></i> Students
                </a>
                <a href="#" class="flex items-center gap-4 py-3 px-4 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-all">
                    <i class="fa-solid fa-bed text-lg"></i> Rooms
                </a>
                <a href="#" class="flex items-center gap-4 py-3 px-4 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-all">
                    <i class="fa-solid fa-credit-card text-lg"></i> Payments
                </a>
            </nav>
        </div>
        <!-- Sidebar Footer / Logout -->
        <div class="p-4 border-t border-slate-700">
            <a href="index.html" class="flex items-center gap-4 py-2 px-4 rounded-lg text-rose-400 hover:bg-rose-500/10 transition-all font-medium">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </a>
        </div>
    </aside>

    <!-- 2. MAIN CONTENT AREA (ডানপাশের অংশ) -->
    <main class="flex-1 flex flex-col overflow-y-auto">
        <!-- Top Bar -->
        <header class="bg-white border-b border-gray-200 py-4 px-8 flex justify-between items-center shadow-sm">
            <h1 class="text-2xl font-bold text-gray-800">Student Directory</h1>
            <div class="flex items-center gap-3">
                <span class="text-sm font-medium text-gray-600">Admin Panel</span>
                <div class="w-8 h-8 rounded-full bg-emerald-500 text-white flex items-center justify-center font-bold">A</div>
            </div>
        </header>

        <!-- Dynamic Content Dashboard Section -->
        <div class="p-8 max-w-7xl w-full mx-auto space-y-6">
            <!-- Action Bar -->
            <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                <div class="relative w-72">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-gray-400"></i>
                    <input type="text" placeholder="Search student by name or room..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-emerald-500 text-sm">
                </div>
                <a href="student.html" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium text-sm py-2.5 px-5 rounded-lg shadow-md transition-all flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> Add New Student
                </a>
            </div>

            <!-- Professional Data Table (স্টুডেন্ট লিস্ট দেখানোর জন্য) -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200 text-gray-600 text-xs font-semibold uppercase tracking-wider">
                            <th class="py-4 px-6">Name</th>
                            <th class="py-4 px-6">Room No</th>
                            <th class="py-4 px-6">Status</th>
                            <th class="py-4 px-6 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100 text-gray-700 text-sm">
                        <!-- Example Student Row 1 -->
                        <tr class="hover:bg-gray-50/70 transition-colors">
                            <td class="py-4 px-6 font-medium text-gray-900">Samia Rahman</td>
                            <td class="py-4 px-6"><span class="bg-slate-100 text-slate-700 py-1 px-2.5 rounded-md font-mono text-xs border border-slate-200">Room-302</span></td>
                            <td class="py-4 px-6"><span class="bg-green-100 text-green-700 py-1 px-2.5 rounded-full text-xs font-medium">Active</span></td>
                            <td class="py-4 px-6 text-right space-x-2">
                                <button class="text-blue-600 hover:text-blue-800 font-medium"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button class="text-rose-600 hover:text-rose-800 font-medium"><i class="fa-solid fa-trash"></i></button>
                            </td>
                        </tr>
                        <!-- Example Student Row 2 -->
                        <tr class="hover:bg-gray-50/70 transition-colors">
                            <td class="py-4 px-6 font-medium text-gray-900">Anika Tabassum</td>
                            <td class="py-4 px-6"><span class="bg-slate-100 text-slate-700 py-1 px-2.5 rounded-md font-mono text-xs border border-slate-200">Room-105</span></td>
                            <td class="py-4 px-6"><span class="bg-amber-100 text-amber-700 py-1 px-2.5 rounded-full text-xs font-medium">Pending</span></td>
                            <td class="py-4 px-6 text-right space-x-2">
                                <button class="text-blue-600 hover:text-blue-800 font-medium"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button class="text-rose-600 hover:text-rose-800 font-medium"><i class="fa-solid fa-trash"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

</body>
</html>
