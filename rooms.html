<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rooms - HostelHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-white">
  <div class="flex min-h-screen">
    <!-- Sidebar (same as dashboard) -->
    <div class="w-72 bg-gray-900 p-6 hidden md:block">
      <h1 class="text-3xl font-bold mb-10 text-cyan-400">HostelHub</h1>
      <!-- Copy sidebar nav from dashboard.html -->
    </div>

    <div class="flex-1 p-8">
      <h2 class="text-4xl font-bold mb-8">Available Rooms</h2>
      
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="bg-gray-900 p-6 rounded-3xl">
          <h3 class="text-2xl font-semibold">A-205</h3>
          <p class="text-cyan-400">Single Room • Available</p>
          <p class="mt-4">৳ 4500 / month</p>
          <button class="mt-6 w-full bg-cyan-500 hover:bg-cyan-600 py-3 rounded-2xl">Book Now</button>
        </div>
        <!-- আরও রুম কার্ড যোগ করতে পারবে -->
      </div>
    </div>
  </div>
</body>
</html>
