<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMS Portal - Sign Up</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">

    <div class="auth-container">
        <div class="auth-card signup-card">
            <div class="auth-header">
                <i class="fa-solid fa-user-plus auth-logo"></i>
                <h2>Resident Registration</h2>
                <p>Create your profile for University Hostel Allotment</p>
            </div>

            <form action="login.html" class="auth-form" id="signupForm">
                <div class="grid-2-col-form">
                    <div class="input-group">
                        <label for="full-name"><i class="fa-solid fa-user"></i> Full Name</label>
                        <input type="text" id="full-name" placeholder="Samia Rahman" required>
                    </div>

                    <div class="input-group">
                        <label for="student-id"><i class="fa-solid fa-id-badge"></i> Student ID</label>
                        <input type="text" id="student-id" placeholder="2026-0412" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="email"><i class="fa-solid fa-envelope"></i> University Email</label>
                    <input type="email" id="email" placeholder="samia@varsity.edu" required>
                </div>

                <div class="grid-2-col-form">
                    <div class="input-group">
                        <label for="dept"><i class="fa-solid fa-graduation-cap"></i> Department</label>
                        <input type="text" id="dept" placeholder="CSE" required>
                    </div>

                    <div class="input-group">
                        <label for="phone"><i class="fa-solid fa-phone"></i> Contact Number</label>
                        <input type="tel" id="phone" placeholder="+88017XXXXXXXX" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password"><i class="fa-solid fa-lock"></i> Create Password</label>
                    <input type="password" id="password" placeholder="Minimum 8 characters" required>
                </div>

                <div class="auth-actions">
                    <label class="remember-me">
                        <input type="checkbox" required> I agree to Hostel Rules & Regulations
                    </label>
                </div>

                <button type="submit" class="btn btn-auth">Submit Application</button>
            </form>

            <div class="auth-footer">
                <p>Already registered? <a href="login.html">Log In instead</a></p>
            </div>
        </div>
    </div>

    <script>
        // Form submit hole data local storage-e temporary save hobe jate dashboard e show kora jay
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            const name = document.getElementById('full-name').value;
            const phone = document.getElementById('phone').value;
            const id = document.getElementById('student-id').value;
            const dept = document.getElementById('dept').value;

            localStorage.setItem('studentName', name);
            localStorage.setItem('studentPhone', phone);
            localStorage.setItem('studentID', id);
            localStorage.setItem('studentDept', dept);
        });
    </script>
</body>
</html>
